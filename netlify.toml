[[headers]]
  for = "/static/*"
  [headers.values]
	cache-control = '''
	public, 
	max-age=604800, 
	s-maxage=43200'''

[[headers]]
  for = "/"
  [headers.values]
	cache-control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
	cache-control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
	cache-control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
	cache-control = "public, max-age=0, must-revalidate"
